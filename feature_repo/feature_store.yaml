project: feature_store_lab
provider: local

# Registry: tracks metadata about feature definitions, entities, and data sources.
# In production, use a SQL-backed registry (PostgreSQL) for multi-team access.
registry:
  registry_type: sql
  path: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
  cache_ttl_seconds: 60

# Offline Store: PostgreSQL for historical feature retrieval.
# Used for generating training datasets via point-in-time joins.
offline_store:
  type: postgres
  host: ${POSTGRES_HOST}
  port: ${POSTGRES_PORT}
  database: ${POSTGRES_DB}
  db_schema: public
  user: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}

# Online Store: Redis for low-latency feature serving.
# Features are materialized from the offline store into Redis.
online_store:
  type: redis
  connection_string: ${REDIS_HOST}:${REDIS_PORT}

# Entity key serialization format
entity_key_serialization_version: 2

# Feature flags
flags:
  alpha_features: true
  on_demand_transforms: true
